name: Scheduled MavatCheck

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MAVATCHECK_GMAIL_USER: ${{ secrets.MAVATCHECK_GMAIL_USER }}
      MAVATCHECK_GMAIL_APP_PASSWORD: ${{ secrets.MAVATCHECK_GMAIL_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scheduled subscriptions
        run: python scripts/run_subscriptions.py
